    <title>Mon Profil | EXPERIMMO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body class="auth-page">
    <div class="auth-wrapper">
        <div class="auth-card-min" style="text-align:center;padding:48px 40px;">
            <div class="auth-logo-wrap" style="margin-bottom:24px;">
                <div class="auth-logo-icon">
                    <i data-lucide="loader-2"></i>
                </div>
                <span class="auth-logo-name">EXPERIMMO</span>
            </div>
            <p style="color:var(--text-secondary);margin-bottom:8px;">Redirection en cours...</p>
            <p style="font-size:0.875rem;color:var(--text-muted);">Vous serez redirigé vers votre espace profil.</p>
        </div>
    </div>

    
    <script type="module" src="js/config.js?v=4/02_081512"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        if(typeof lucide!=='undefined') lucide.createIcons();
    });
    </script>
    <script type="module">
    import CONFIG from './js/config.js?v=4/02_081512';
    const { createClient } = supabase;
    const sb = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

    (async () => {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.href = 'login.html'; return; }

        const { data: profile } = await sb.from('profiles').select('role').eq('id', session.user.id).single();
        const role = profile?.role || '';

        if (role === 'proprietaire') window.location.href = 'proprietaire/profil.html';
        else if (role === 'locataire') window.location.href = 'locataire/profil.html';
        else if (role === 'gestionnaire') window.location.href = 'gestionnaire/index.html';
        else if (role === 'admin' || role === 'assistante') window.location.href = 'admin/parametres.html';
        else window.location.href = 'index.html';
    })();
    </script>
</body>
</html>
