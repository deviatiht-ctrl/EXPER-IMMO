services:
  - type: web
    name: exper-immo-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exper-immo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        value: https://exper-immo.onrender.com
      - key: ADMIN_EMAIL
        value: admin@experimmo.com
      - key: ADMIN_PASSWORD
        generateValue: false
        value: Admin@Exp2024!
      - key: ADMIN_NAME
        value: Administrateur EXPERIMMO

databases:
  - name: exper-immo-db
    databaseName: exper_immo
    user: exper_immo_user
