name: experimmo
description: EXPERIMMO - Application de gestion immobilière premium
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  flutter_dotenv: ^5.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.2
  url_launcher: ^6.3.1
  file_picker: ^8.1.4
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
