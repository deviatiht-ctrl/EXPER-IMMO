    <link rel="stylesheet" href="/css/variables.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/portal.css">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#059669">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#059669">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EXPERIMMO">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png">
</head>
<body class="portal-body">
<div class="portal-layout">
    <aside class="portal-sidebar locataire" id="sidebar">
        <a href="../index.html" class="sidebar-logo">
                <div class="logo-icon">
                    <img src="/assets/EXPER IMMO LOGO.png" alt="EXPERIMMO" onerror="this.style.display='none'; this.parentNode.innerHTML='<i data-lucide=home></i>';">
                </div>
                <span>EXPERIMMO</span>
            </a>
        <div class="portal-user">
            <div class="portal-user-avatar" id="user-avatar">L</div>
            <div class="portal-user-info">
                <h4 id="user-name">Chargement...</h4>
                <span>Locataire</span>
            </div>
        </div>
        <nav class="portal-nav">
            <div class="portal-nav-section">
                <h5>Mon Espace</h5>
                <a href="../../index.html"><i data-lucide="layout-dashboard"></i> Tableau de bord</a>
                <a href="mon-contrat.html"><i data-lucide="file-text"></i> Mon Contrat</a>
                <a href="mes-paiements.html"><i data-lucide="wallet"></i> Mes Paiements</a>
                <a href="mes-factures.html"><i data-lucide="receipt"></i> Mes Factures</a>
                <a href="mes-echeances.html"><i data-lucide="calendar"></i> Mes Échéances</a>
            </div>
            <div class="portal-nav-section">
                <h5>Communication</h5>
                <a href="messagerie.html"><i data-lucide="message-square"></i> Messagerie</a>
                <a href="documents.html" class="active"><i data-lucide="folder"></i> Mes Documents</a>
            </div>
        </nav>
        <div class="portal-sidebar-footer">
            <a href="profil.html"><i data-lucide="user"></i> Profil</a>
            <a href="#" id="btn-logout"><i data-lucide="log-out"></i> Déconnexion</a>
        </div>
    </aside>

    <main class="portal-main">
        <header class="portal-header">
            <h1><i data-lucide="folder"></i> Mes Documents</h1>
        </header>
        <div class="portal-content">
            <div class="portal-card">
                <div class="portal-card-header">
                    <h3><i data-lucide="file"></i> Documents disponibles</h3>
                    <input type="text" id="search-doc" placeholder="Rechercher..." style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-body);width:200px;">
                </div>
                <div class="portal-card-body">
                    <table class="portal-table">
                        <thead>
                            <tr>
                                <th>Nom du document</th>
                                <th>Type</th>
                                <th>Date</th>
                                <th>Format</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="docs-tbody">
                            <tr>
                                <td colspan="5" class="text-center" style="padding:40px;color:var(--text-muted);">
                                    <i data-lucide="folder-open" style="width:40px;height:40px;display:block;margin:0 auto 10px;"></i>
                                    Aucun document disponible pour le moment.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script type="module" src="/js/locataire-dashboard.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => { if(typeof lucide!=='undefined') lucide.createIcons(); });</script>
</body>
</html>
