<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Anti-cache meta tags -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Favicon / Logo -->
    <link rel="icon" type="image/png" href="/assets/EXPER IMMO LOGO.png">
    <link rel="shortcut icon" type="image/png" href="/assets/EXPER IMMO LOGO.png">
    <link rel="apple-touch-icon" href="/assets/EXPER IMMO LOGO.png">
    <title>Propriétés | EXPER IMMO Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/admin-modern.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#c9a84c">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EXPER IMMO">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png">
    <link rel="shortcut icon" href="/assets/icons/icon-192.png">
</head>
<body class="admin-body">
    <aside class="admin-sidebar" id="sidebar">
        <a href="../index.html" class="sidebar-logo">
            <img src="/assets/EXPER IMMO LOGO.png" alt="EXPER IMMO" class="sidebar-logo-img" onerror="this.style.display='none'">
            <div class="sidebar-logo-text"><strong>EXPER IMMO</strong><span>Administration</span></div>
        </a>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
            <a href="proprietes.html" class="nav-link active"><i data-lucide="building-2"></i><span>Propriétés</span></a>
            <a href="proprietaires.html" class="nav-link"><i data-lucide="user-check"></i><span>Propriétaires</span></a>
            <a href="locataires.html" class="nav-link"><i data-lucide="users"></i><span>Locataires</span></a>
            <a href="agents.html" class="nav-link"><i data-lucide="briefcase"></i><span>Agents</span></a>
            <a href="contrats.html" class="nav-link"><i data-lucide="file-text"></i><span>Contrats</span></a>
            <a href="paiements.html" class="nav-link"><i data-lucide="credit-card"></i><span>Paiements</span></a>
            <a href="contacts.html" class="nav-link"><i data-lucide="message-square"></i><span>Messages</span></a>
            <a href="statistiques.html" class="nav-link"><i data-lucide="bar-chart-3"></i><span>Statistiques</span></a>
            <a href="parametres.html" class="nav-link"><i data-lucide="settings"></i><span>Paramètres</span></a>
        </nav>
        <div class="sidebar-footer">
            <button id="btn-logout"><i data-lucide="log-out"></i>Déconnexion</button>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <div>
                <h1>Propriétés</h1>
                <p class="header-subtitle" id="prop-count">Chargement du catalogue...</p>
            </div>
            <a href="propriete-form.html" class="btn-primary"><i data-lucide="plus"></i> Ajouter une propriété</a>
        </header>

        <div class="admin-content">
        <div class="admin-card">
            <div class="card-header">
                <h3><i data-lucide="building-2"></i> Catalogue Immobilier</h3>
                <div class="filter-bar">
                    <div class="search-input-wrap"><i data-lucide="search"></i><input type="text" placeholder="Titre, ref, zone..." id="search-proprietes"></div>
                    <select class="filter-select" id="filter-statut-prop">
                        <option value="">Tous statuts</option>
                        <option value="disponible">Disponible</option>
                        <option value="loue">Loué</option>
                        <option value="vendu">Vendu</option>
                    </select>
                </div>
            </div>
            <div class="card-body">
            <div class="admin-table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Photo</th>
                        <th>Réf.</th>
                        <th>Titre</th>
                        <th>Zone</th>
                        <th>Prix</th>
                        <th>Statut</th>
                        <th>Vues</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="prop-tbody">
                    <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--admin-text-muted);">Chargement...</td></tr>
                </tbody>
            </table>
            </div>
            </div>
        </div>
        </div>
    </main>

    
    <script type="module" src="/js/admin/proprietes.js"></script>
    <script>document.addEventListener('DOMContentLoaded',()=>{ if(typeof lucide!=='undefined') lucide.createIcons(); });</script>
    <script>
    if('serviceWorker' in navigator){
        window.addEventListener('load',function(){
            navigator.serviceWorker.register('/sw.js')
                .then(function(r){console.log('[PWA] SW OK',r.scope);})
                .catch(function(e){console.warn('[PWA] SW err',e);});
        });
    }
    </script>
</body>
</html>
