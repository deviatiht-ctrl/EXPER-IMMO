<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | EXPERIMMO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        .auth-sidebar-img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity: 0.2; }
        .auth-step { display: none; }
        .auth-step.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .role-card { 
            padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
        }
        .role-card.selected { border-color: #c9a84c; background: #fefce8; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { font-size: 0.8rem; font-weight: 600; color: #475569; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.9rem; }
    </style>
</head>
<body class="auth-page">

    <div class="auth-sidebar" style="padding: 30px;">
        <img src="https://images.unsplash.com/photo-1448630360428-65456885c650?ixlib=rb-4.0.3&auto=format&fit=crop&w=1167&q=80" class="auth-sidebar-img">
        <div style="position:relative; z-index:10;">
            <img src="/assets/logo.PNG" alt="Logo" style="height: 45px; margin-bottom: 20px;">
            <h1 style="font-size: 2rem; margin-bottom: 10px;">Votre futur<br>commence <span style="color: #c9a84c;">ici</span></h1>
            <p style="font-size: 0.9rem; opacity: 0.8;">Expertise et confiance dans chaque transaction immobilière en Haïti.</p>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-form-card" style="max-width: 440px;">
            <a href="index.html" style="display:inline-flex; align-items:center; gap:8px; color:#64748b; text-decoration:none; font-size:0.85rem; margin-bottom:20px; transition:0.2s;" onmouseover="this.style.color='#c9a84c'" onmouseout="this.style.color='#64748b'">
                <i data-lucide="arrow-left" style="width:16px;"></i> Retour à l'accueil
            </a>
            <header style="margin-bottom: 15px;">
                <h2 style="font-size: 1.5rem;">Créer un compte</h2>
                <div id="step-indicator" style="display:flex; gap:5px; margin-top:8px;">
                    <div class="step-dot active" style="flex:1; height:4px; background:#c9a84c; border-radius:2px;"></div>
                    <div class="step-dot" style="flex:1; height:4px; background:#e2e8f0; border-radius:2px;"></div>
                </div>
            </header>

            <form id="register-form">
                <input type="hidden" id="selected-role">

                <!-- ÉTAPE 1: RÔLE -->
                <div id="step-role" class="auth-step active">
                    <p style="font-size: 0.9rem; margin-bottom: 15px; color:#64748b;">Choisissez votre profil :</p>
                    <div class="role-card" onclick="selectRole('proprietaire')">
                        <i data-lucide="key" style="color:#c9a84c"></i>
                        <div><strong style="font-size:0.9rem;">Propriétaire</strong><p style="font-size:0.75rem; color:#64748b;">Je gère mes biens</p></div>
                    </div>
                    <div class="role-card" onclick="selectRole('locataire')">
                        <i data-lucide="home" style="color:#c9a84c"></i>
                        <div><strong style="font-size:0.9rem;">Locataire</strong><p style="font-size:0.75rem; color:#64748b;">Je cherche une location</p></div>
                    </div>
                </div>

                <!-- ÉTAPE 2: INFOS PERSONNELLES -->
                <div id="step-info" class="auth-step">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nom Complet</label>
                            <input type="text" id="full_name" placeholder="P. Ex: Jean Pierre">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" placeholder="email@exemple.com">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Téléphone</label>
                            <input type="tel" id="phone" placeholder="+509 XXXX-XXXX">
                        </div>
                        <div class="form-group">
                            <label>NIF / CIN</label>
                            <input type="text" id="nif_cin" placeholder="000-000-000-0">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Adresse</label>
                            <input type="text" id="adresse" placeholder="Rue, quartier...">
                        </div>
                        <div class="form-group">
                            <label>Sexe</label>
                            <select id="sexe">
                                <option value="M">Masculin</option>
                                <option value="F">Féminin</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Mot de passe</label>
                            <input type="password" id="password" placeholder="••••••••">
                        </div>
                        <div class="form-group">
                            <label>Confirmer</label>
                            <input type="password" id="password_confirm" placeholder="••••••••">
                        </div>
                    </div>
                    
                    <button type="submit" style="width:100%; padding:10px; background:#1e293b; color:white; border:none; border-radius:6px; font-weight:600; cursor:pointer; margin-top:10px;">
                        Finaliser l'inscription
                    </button>
                    <button type="button" onclick="showStep('step-role')" style="width:100%; background:none; border:none; color:#64748b; margin-top:8px; font-size:0.85rem; cursor:pointer;">Retour</button>
                </div>
            </form>

            <p style="text-align:center; color: #64748b; font-size: 0.8rem; margin-top: 20px;">
                Déjà un compte ? <a href="login.html" style="color: #c9a84c; font-weight:700; text-decoration:none;">Se connecter</a>
            </p>
        </div>
    </div>

    
    <script type="module" src="/js/auth.js?v=4"></script>
    <script>
        function showStep(id) {
            document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            let dots = document.querySelectorAll('.step-dot');
            if(id === 'step-role') { dots[1].style.background = '#e2e8f0'; }
            else { dots[1].style.background = '#c9a84c'; }
        }
        function selectRole(role) {
            document.getElementById('selected-role').value = role;
            showStep('step-info');
        }
    </script>
</body>
</html>
